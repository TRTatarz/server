spring.application.name=backend
server.port=8080

# AI Config
openrouter.api.key=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
openrouter.api.model=openai/gpt-oss-120b

# Database Connection
spring.datasource.url=jdbc:h2:file:./data/chatdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# H2 Console
spring.h2.console.enabled=false
spring.h2.console.path=/db-admin
spring.h2.console.settings.web-allow-others=true

spring.mvc.static-path-pattern=/static/**